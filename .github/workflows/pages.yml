name: Deploy Quarto Book (Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Build book
        run: make build

      - name: Verify site includes PDFs
        run: |
          set -e
          test -f book/dist/pdf/enrollment-notice.pdf || { echo "missing: book/dist/pdf/enrollment-notice.pdf"; exit 1; }
          for n in 1 2 3 4 5 6 7; do
            f="book/dist/pdf/week${n}-exercises.pdf"
            test -f "$f" || { echo "missing: $f"; exit 1; }
          done
          echo "OK: enrollment-notice.pdf and week*-exercises.pdf present under dist/pdf/"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
